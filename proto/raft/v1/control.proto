syntax = "proto3";

package raft.v1;

option go_package = "raft/gen/proto/raft/v1;raft";

import "raft/v1/peer.proto";

service RaftControlService {
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc Propose(ProposeRequest) returns (ProposeResponse);
  rpc StepDown(StepDownRequest) returns (StepDownResponse);
}

message ListNodesRequest {}

message ListNodesResponse {
  repeated NodeRef nodes = 1;
}

message NodeRef {
  string id = 1;
  string addr = 2;
}

message StatusRequest {}

message StatusResponse {
  RaftStatus status = 1;
}

message RaftStatus {
  string node_id = 1;
  string role = 2;
  uint64 term = 3;
  string voted_for = 4;
  uint64 commit_index = 5;
  uint64 last_applied = 6;
  raft.v1.LogID last_log_id = 7;
  NodeRef leader = 8;
}

message ProposeRequest {
  bytes command = 1;
}

message ProposeResponse {
  uint64 index = 1; 
}

message StepDownRequest {}

message StepDownResponse {}
