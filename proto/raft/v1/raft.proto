syntax = "proto3";

package raft.v1;

option go_package = "raft/gen/proto/raft/v1;raft";

service RaftService {
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}

message AppendEntriesRequest {
	string leader_id = 1;
	uint64 term = 2; 
    uint64 prev_log_index = 3;
    uint64 prev_log_term = 4;
	repeated LogEntry entries = 5;
}

message AppendEntriesResponse {
  uint64 term = 1; 
  bool success = 2;
}

message LogEntry {
  uint64 index = 1;
  uint64 term = 2;
  bytes command = 3; 
}
