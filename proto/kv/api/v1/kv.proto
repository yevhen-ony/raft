syntax = "proto3";

package api.v1;

option go_package = "raft/gen/proto/kv/api/v1";

service KVService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Del(DeleteRequest) returns (DeleteResponse);
  rpc List(ListRequest) returns (ListResponse);
}

message GetRequest{
  string key = 1;
}

message GetResponse{
  string value = 1;
}

message PutRequest {
  KeyValue item = 1;
}

message PutResponse{}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {}

message ListRequest {}

message ListResponse {
  repeated Pair items = 1;
}

message Pair {
  string key = 1;
  string value = 2;
}
